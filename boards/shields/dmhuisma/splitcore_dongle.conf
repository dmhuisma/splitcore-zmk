
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# ZMK_POINTING_DEFAULT_SCRL_VAL=5

CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_STANDARD=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_CUSTOM=y

# L2CAP MTU configuration - set to at least your packet size
CONFIG_BT_L2CAP_TX_MTU=128

# ACL buffer sizes - must be >= L2CAP_TX_MTU + L2CAP overhead (~4-8 bytes)
CONFIG_BT_BUF_ACL_TX_SIZE=136
CONFIG_BT_BUF_ACL_RX_SIZE=136

# Controller data length extension (251 is max for BLE, fragmentation handles larger)
CONFIG_BT_CTLR_DATA_LENGTH_MAX=136

CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y

# Increase overall buffer counts
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_BUF_ACL_RX_COUNT=8

# L2CAP TX buffer count for dynamic channels
CONFIG_BT_L2CAP_TX_BUF_COUNT=30
